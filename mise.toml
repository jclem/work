[tools]
rust = "stable"

[tasks.dev]
run = "cargo run -- daemon start"

[tasks.check]
depends = ["check:*"]

[tasks.test]
run = "cargo test"

[tasks."check:fmt"]
run = "cargo fmt --check"

[tasks."check:clippy"]
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.fix]
run = [
    "cargo fmt",
    "cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features",
]

[tasks."release:local"]
run = [
    "cargo build --release",
    "install -m 0755 target/release/work /usr/local/bin/work",
]

[tasks."release:github"]
run = "gh workflow run release.yml --field bump={{arg(name='bump', usage='patch, minor, or major')}}"

[tasks."agents:sync"]
run = ".agents/sync.sh"

[tasks."agents:check"]
run = ".agents/sync.sh --check"

[tasks.pre-commit]
depends = ["check", "test", "agents:check"]
