[tools]
rust = "stable"

[tasks.dev]
run = "cargo run -- daemon start"

[tasks.check]
depends = ["check:*"]

[tasks.test]
run = "cargo test"

[tasks."check:fmt"]
run = "cargo fmt --check"

[tasks."check:clippy"]
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.fix]
run = [
    "cargo fmt",
    "cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features",
]

[tasks."release:local"]
run = [
    "cargo build --release",
    "install -m 0755 target/release/work /usr/local/bin/work",
]

[tasks."release:github"]
run = """
PREV_RUN_ID=$(gh run list --workflow release.yml --limit 1 --json databaseId --jq '.[0].databaseId // empty')
gh workflow run release.yml --field bump={{arg(name='bump', usage='patch, minor, or major')}}
if [ "{{flag(name='watch')}}" = "true" ]; then
  echo "Waiting for workflow run to start..."
  NEW_RUN_ID="$PREV_RUN_ID"
  while [ "$NEW_RUN_ID" = "$PREV_RUN_ID" ] || [ -z "$NEW_RUN_ID" ]; do
    sleep 1
    NEW_RUN_ID=$(gh run list --workflow release.yml --limit 1 --json databaseId --jq '.[0].databaseId // empty')
  done
  gh run watch "$NEW_RUN_ID"
fi
"""

[tasks."test:docker"]
run = "docker build -f Dockerfile.test -t work-test . && docker run --rm work-test"

[tasks."agents:sync"]
run = ".agents/sync.sh"

[tasks."agents:check"]
run = ".agents/sync.sh --check"

[tasks.pre-commit]
depends = ["check", "test", "agents:check"]
